name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy ANOUANZÊ ERP
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "echo '==> SSH OK, host: $(hostname)'"

      - name: Deploy ANOUANZÊ ERP
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
          set -e
          cd /opt/anouanze-erp

          echo "==> Git pull..."
          git pull origin master

          echo "==> Build web..."
          docker compose -f docker-compose.prod.yml build web --no-cache

          echo "==> Restart web..."
          docker compose -f docker-compose.prod.yml up -d web

          echo "==> Attente démarrage API..."
          sleep 10
          echo "==> Migration Prisma..."
          docker compose -f docker-compose.prod.yml exec -T api npx prisma migrate deploy || echo "Migration ignorée (déjà à jour)"

          echo "==> Done ✓"
          docker compose -f docker-compose.prod.yml ps
          ENDSSH
