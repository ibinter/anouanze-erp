name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy ANOUANZÊ ERP
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.VPS_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          echo "" >> ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "echo '==> SSH OK'"

      - name: Git pull on VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd /opt/anouanze-erp && git pull origin master"

      - name: Build web (background, ~10 min)
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 -o ServerAliveCountMax=40 \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd /opt/anouanze-erp && docker compose -f docker-compose.prod.yml build web --no-cache"

      - name: Restart web container
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd /opt/anouanze-erp && docker compose -f docker-compose.prod.yml stop web && docker compose -f docker-compose.prod.yml up -d web && sleep 5 && docker compose -f docker-compose.prod.yml ps web"

      - name: Run Prisma migrations
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd /opt/anouanze-erp && sleep 10 && docker compose -f docker-compose.prod.yml exec -T api npx prisma migrate deploy || echo 'Migration ignorée'"
